<head>

<title>ఆదికాండము కాలక్రమము: ఆదాము నుండి అబ్రాహాము వరకు</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600;700&family=Noto+Sans+Telugu:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #ffffff;
  --accent: #d32f2f; /* Red */
  --highlight: #000000; /* Black for fonts that were yellow */
  --text: #000000;
  --glass: rgba(255, 255, 255, 0.95);
  --glass-border: rgba(0, 0, 0, 0.15);
}

html, body { width:100vw; height:100vh; overflow:hidden; background:var(--bg);
  font-family:'Noto Sans Telugu','Inter',sans-serif; color:var(--text); }

/* ── LAYOUT ── */
#app {
  position:fixed; inset:0; z-index:2;
  display:block;
  transition: filter 0.6s ease;
}
#app.blurred {
  filter: blur(8px);
  pointer-events: none;
}

header {
  position: absolute; top: 0; left: 0; width: 100%;
  text-align:center; padding:18px 0; z-index:5;
  background:linear-gradient(to bottom, rgba(255,255,255,.95) 40%, transparent);
  pointer-events: none;
}
header h1 {
  font-family:'Cinzel',serif; font-size:2.2rem; color:var(--highlight);
  letter-spacing:2px;
}
header p { font-size:1.05rem; opacity:.75; margin-top:4px; }

/* ── TIMELINE AREA ── */
#timeline-area {
  width:100%; height:100%;
  position:relative;
}

/* ── SPOTLIGHT OVERLAY ── */
#spotlight-overlay {
  position:fixed; inset:0; z-index:10;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
}

.spot-card {
  width: 90%; max-width: 960px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 30px 40px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.12);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  opacity:0; transform:translateY(40px) scale(0.95);
  transition: opacity 0.5s, transform 0.5s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
.spot-card.visible {
  opacity:1; transform:translateY(0) scale(1); pointer-events:auto;
}

.spot-name {
  font-size:3rem; font-weight:700; color:#000; margin-bottom:10px;
}

.spot-bar-wrap { position:relative; width:100%; height:56px; margin:20px 0 24px; display:flex; border-radius:8px; overflow:hidden; }
.spot-seg {
  height:100%; display:flex; align-items:center; justify-content:center;
  font-family:'Inter',sans-serif; font-weight:700; font-size:1.1rem;
  position:relative;
}
.spot-seg.before { background:var(--accent); color:#fff; }
.spot-seg.after  { background:#fff; color:#000; border:2px solid #000; border-left:none; }

.spot-seg .seg-years { font-size:1.7rem; font-weight:700; }
.spot-seg .seg-label { font-size:.75rem; opacity:.85; margin-top:2px; }
.spot-seg-inner { display:flex; flex-direction:column; align-items:center; }

.spot-stats {
  display:flex; gap:36px; margin-bottom:20px; flex-wrap:wrap; align-items:center;
}
.spot-stat { display:flex; flex-direction:column; }
.spot-stat.highlight {
  border: 2px solid var(--accent);
  border-radius: 8px;
  padding: 10px 16px;
  background-color: rgba(211, 47, 47, 0.06);
}
.spot-stat-label { font-size:1.05rem; letter-spacing:0.5px; opacity:.8; margin-bottom:4px; font-weight:600; }
.spot-stat-val { font-size:1.9rem; font-weight:700; color:var(--accent); }

.spot-verses { margin-top:10px; }
.spot-verse {
  font-size:1.15rem; line-height:1.7;
  border-left:4px solid var(--highlight); padding-left:16px; margin-bottom:16px;
  color:#111;
}

/* ── STEP COUNTER ── */
#step-info {
  position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
  font-size:.95rem; color:var(--highlight); opacity:.8; z-index:20; font-weight:600;
}

/* ── TOOLTIP ── */
#tooltip {
  position:fixed; z-index:200; pointer-events:none;
  background:var(--glass); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border:1px solid var(--glass-border); border-radius:10px;
  padding:14px 16px; color:var(--text); max-width:340px;
  box-shadow:0 6px 28px rgba(0,0,0,.15);
  opacity:0; transition:opacity .15s;
}
#tooltip.show { opacity:1; }
#tooltip .tt-name { font-size:1.2rem; font-weight:700; color:#000; }
#tooltip .tt-period { font-size:.78rem; color:var(--highlight); margin-bottom:8px; font-weight:600; }
#tooltip .tt-row { display:flex; gap:16px; margin-bottom:4px; }
#tooltip .tt-lbl { font-size:.68rem; opacity:.7; text-transform:uppercase; }
#tooltip .tt-val { font-size:1.15rem; font-weight:600; color:var(--accent); }
#tooltip .tt-ref { font-size:.8rem; font-style:italic; border-left:2px solid var(--highlight);
  padding-left:8px; margin-top:8px; color:#333; }
</style>
</head>

// ═══════════════ CHART STATE ═══════════════
const TOTAL = DATA.length;
let globalStep = 0; // 0 to 39
const tlArea = document.getElementById('timeline-area');
const appContainer = document.getElementById('app');
const cardEl = document.getElementById('spot-card');
const ttip = document.getElementById('tooltip');
const stepInfo = document.getElementById('step-info');

let svgEl = null;
let barState = [];
let animId = null;

const ML = 130, MR = 30, MT = 100, MB = 40;
const X_MAX = Math.max(...DATA.map(d=>d.death_ysc)) + 60; // Global constant

function ensureSVG() {
  if (svgEl) return;
  svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svgEl.style.display = 'block';
  svgEl.style.width = '100%';
  svgEl.style.height = '100%';
  tlArea.appendChild(svgEl);
}

// ── Layout calculates slots based on 20 fixed positions ──
function calcLayout(n) {
  const W = innerWidth;
  const H = innerHeight;
  const cW = W - ML - MR;
  const cH = H - MT - MB;
  const rowH = cH / TOTAL; 
  const barH = Math.min(rowH * 0.7, 30);

  const vis = DATA.slice(0, n);
  return vis.map((d, i) => ({
    x1: ML + (d.birth_ysc / X_MAX) * cW,
    x2: ML + (d.son_ysc / X_MAX) * cW,
    x3: ML + (d.death_ysc / X_MAX) * cW,
    y: MT + rowH * i + (rowH - barH) / 2,
    h: barH,
    op: 1
  }));
}

function lerp(a,b,t){ return a+(b-a)*t; }
function ease(t){ return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }

function animateTimeline(targetLayout, n, dur) {
  if (animId) cancelAnimationFrame(animId);
  const vis = DATA.slice(0, n);

  const start = [];
  for (let i = 0; i < n; i++) {
    if (barState[i]) {
      start.push({...barState[i]});
    } else {
      start.push({ x1:targetLayout[i].x1, x2:targetLayout[i].x1, x3:targetLayout[i].x1,
                    y:targetLayout[i].y, h:targetLayout[i].h, op:0 });
    }
  }

  const t0 = performance.now();
  function tick(now) {
    let t = Math.min(1, (now-t0)/dur);
    const et = ease(t);
    const cur = [];
    for (let i=0;i<n;i++) {
      cur.push({
        x1: lerp(start[i].x1, targetLayout[i].x1, et),
        x2: lerp(start[i].x2, targetLayout[i].x2, et),
        x3: lerp(start[i].x3, targetLayout[i].x3, et),
        y:  lerp(start[i].y,  targetLayout[i].y,  et),
        h:  lerp(start[i].h,  targetLayout[i].h,  et),
        op: lerp(start[i].op, targetLayout[i].op, et),
      });
    }
    drawTimeline(cur, vis, n);
    if (t<1) { animId=requestAnimationFrame(tick); }
    else { barState=cur; animId=null; }
  }
  animId = requestAnimationFrame(tick);
}

// ── Draw SVG frame ──
function drawTimeline(state, vis, n) {
  const W = innerWidth;
  const H = innerHeight;
  const cW = W - ML - MR;
  const tickStep = X_MAX<500?50:X_MAX<1500?100:X_MAX<3000?200:500;
  
  let html = '';
  // X-axis is ALWAYS present
  html += `<line x1="${ML}" y1="${H-MB}" x2="${W-MR}" y2="${H-MB}" stroke="rgba(0,0,0,.2)"/>`;
  for(let tv=0;tv<=X_MAX;tv+=tickStep){
    const x=ML+(tv/X_MAX)*cW;
    html+=`<line x1="${x}" y1="${MT}" x2="${x}" y2="${H-MB}" stroke="rgba(0,0,0,.06)"/>`;
    html+=`<line x1="${x}" y1="${H-MB}" x2="${x}" y2="${H-MB+5}" stroke="rgba(0,0,0,.3)"/>`;
    html+=`<text x="${x}" y="${H-MB+17}" text-anchor="middle" fill="rgba(0,0,0,.6)" font-size="10" font-family="Inter,sans-serif">${tv}</text>`;
  }

  for (let i=0;i<n;i++){
    const s=state[i], d=vis[i];
    const wB=Math.max(0,s.x2-s.x1), wA=Math.max(0,s.x3-s.x2);
    const op=s.op.toFixed(3);
    const fs=Math.max(9,Math.min(14,s.h*.75));
    const lfs=Math.max(8,Math.min(12,s.h*.6));

    // Name
    html+=`<text x="${s.x1-8}" y="${s.y+s.h/2+fs*.35}" text-anchor="end"
      fill="rgba(0,0,0,${op})" font-size="${fs}px"
      font-family="Noto Sans Telugu,Inter,sans-serif" font-weight="600">${d.name}</text>`;

    // Before bar (Red)
    html+=`<rect class="seg" data-idx="${i}" data-period="before"
      x="${s.x1}" y="${s.y}" width="${wB}" height="${s.h}"
      rx="2" fill="var(--accent)" opacity="${op}" style="cursor:pointer"/>`;
    if(wB>22) html+=`<text x="${s.x1+wB/2}" y="${s.y+s.h/2+lfs*.35}" text-anchor="middle"
      fill="rgba(255,255,255,${(s.op*.9).toFixed(3)})" font-size="${lfs}px"
      font-family="Inter,sans-serif" font-weight="600" pointer-events="none">${d.age_at_son}</text>`;

    // After bar (White with Black Border)
    html+=`<rect class="seg" data-idx="${i}" data-period="after"
      x="${s.x2}" y="${s.y}" width="${wA}" height="${s.h}"
      rx="2" fill="#ffffff" stroke="#000000" stroke-width="1.5" opacity="${op}" style="cursor:pointer"/>`;
    if(wA>22) html+=`<text x="${s.x2+wA/2}" y="${s.y+s.h/2+lfs*.35}" text-anchor="middle"
      fill="rgba(0,0,0,${(s.op*.8).toFixed(3)})" font-size="${lfs}px"
      font-family="Inter,sans-serif" font-weight="600" pointer-events="none">${d.years_after}</text>`;
  }

  svgEl.innerHTML = html;
  
  // Hover listeners
  svgEl.querySelectorAll('.seg').forEach(el=>{
    el.addEventListener('mouseenter', onHover);
    el.addEventListener('mouseleave', onLeave);
    el.addEventListener('mousemove', onMove);
  });
}

// ═══════════════ SPOTLIGHT CARD ═══════════════
function renderCard(d, idx) {
  const sonName = idx < DATA.length - 1 ? DATA[idx + 1].name : "ఇస్సాకు";
  cardEl.innerHTML = `
    <div class="spot-name">${d.name} <span style="color:#888; font-weight:400; font-size:0.85em; margin:0 10px;">&rarr;</span> <span style="color:var(--accent)">${sonName}</span></div>
    <div class="spot-bar-wrap">
      <div class="spot-seg before" style="flex:${d.age_at_son}">
        <div class="spot-seg-inner">
          <div class="seg-years">${d.age_at_son}</div>
          <div class="seg-label">కుమారుడు పుట్టే వరకు</div>
        </div>
      </div>
      <div class="spot-seg after" style="flex:${d.years_after}">
        <div class="spot-seg-inner">
          <div class="seg-years">${d.years_after}</div>
          <div class="seg-label">కుమారుడు పుట్టిన తర్వాత</div>
        </div>
      </div>
    </div>
    <div class="spot-stats">
      <div class="spot-stat">
        <span class="spot-stat-label">కుమారుడు పుట్టిన వయస్సు</span>
        <span class="spot-stat-val">${d.age_at_son} సం.</span>
      </div>
      <div class="spot-stat">
        <span class="spot-stat-label">తర్వాత జీవించిన కాలం</span>
        <span class="spot-stat-val" style="color:var(--highlight)">${d.years_after} సం.</span>
      </div>
      <div class="spot-stat">
        <span class="spot-stat-label">మొత్తం ఆయుష్షు</span>
        <span class="spot-stat-val" style="color:var(--highlight)">${d.total} సం.</span>
      </div>
      <div class="spot-stat highlight">
        <span class="spot-stat-label">సృష్టి నుండి కాలం</span>
        <span class="spot-stat-val" style="color:var(--highlight)">${d.birth_ysc} – ${d.death_ysc}</span>
      </div>
    </div>
    <div class="spot-verses">
      <div class="spot-verse"><strong>${d.ref_son}:</strong> ${d.verse_son}</div>
      <div class="spot-verse"><strong>${d.ref_after}:</strong> ${d.verse_after}</div>
    </div>
  `;
}

// ═══════════════ TOOLTIP ═══════════════
function onHover(e){
  // Do not show tooltip if background is blurred
  if(appContainer.classList.contains('blurred')) return;

  const idx=+e.target.dataset.idx, period=e.target.dataset.period, d=DATA[idx];
  const pLabel = period==='before'?'కుమారుడు పుట్టే వరకు':'కుమారుడు పుట్టిన తర్వాత';
  const yrs = period==='before'?d.age_at_son:d.years_after;
  const rng = period==='before'?`${d.birth_ysc} – ${d.son_ysc}`:`${d.son_ysc} – ${d.death_ysc}`;
  const ref = period==='before'?d.ref_son:d.ref_after;

  ttip.innerHTML=`
    <div class="tt-name">${d.name}</div>
    <div class="tt-period">${pLabel}</div>
    <div class="tt-row">
      <div><div class="tt-lbl">సంవత్సరాలు</div><div class="tt-val">${yrs}</div></div>
      <div><div class="tt-lbl">మొత్తం ఆయుష్షు</div><div class="tt-val" style="color:var(--highlight)">${d.total}</div></div>
    </div>
    <div class="tt-ref">${ref}</div>`;
  ttip.classList.add('show');
  svgEl.querySelectorAll('.seg').forEach(el=>{ if(el!==e.target)el.setAttribute('opacity','0.3'); });
  e.target.setAttribute('opacity','1');
}
function onLeave(){
  ttip.classList.remove('show');
  svgEl.querySelectorAll('.seg').forEach(el=>el.setAttribute('opacity','1'));
}
function onMove(e){
  let l=e.clientX+16, t=e.clientY-20;
  if(l+350>innerWidth) l=e.clientX-360;
  if(l<8) l=8;
  if(t<8) t=8;
  const tr=ttip.getBoundingClientRect();
  if(t+tr.height>innerHeight-8) t=innerHeight-tr.height-8;
  ttip.style.left=l+'px'; ttip.style.top=t+'px';
}

// ═══════════════ STATE MACHINE ═══════════════
let busy = false;

function goToStep(s) {
  if (busy) return;
  
  if (s < 0) s = 0;
  if (s > TOTAL * 2 - 1) s = TOTAL * 2 - 1;
  globalStep = s;

  const pIndex = Math.floor(globalStep / 2);
  const isCardPhase = (globalStep % 2 === 0);
  
  const numBars = isCardPhase ? pIndex : pIndex + 1;
  stepInfo.textContent = `${pIndex + 1} / ${TOTAL} ${isCardPhase ? '(వివరాలు)' : '(చార్టు)'}`;

  ensureSVG();

  if (isCardPhase) {
    // Phase A: Show Card, Blur Background
    appContainer.classList.add('blurred');
    renderCard(DATA[pIndex], pIndex);
    cardEl.classList.add('visible');
    
    // Animate bars silently in background
    const target = calcLayout(numBars);
    animateTimeline(target, numBars, 300);
  } else {
    // Phase B: Hide Card, Unblur, Animate Bar in
    busy = true;
    appContainer.classList.remove('blurred');
    cardEl.classList.remove('visible');
    
    setTimeout(() => {
      const target = calcLayout(numBars);
      animateTimeline(target, numBars, 700);
      setTimeout(() => { busy = false; }, 750);
    }, 400); // Wait for unblur & card fade
  }
}

// ── Keyboard ──
addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goToStep(globalStep + 1);
  if (e.key === 'ArrowLeft')  goToStep(globalStep - 1);
});

// ── Resize ──
addEventListener('resize', () => {
  const pIndex = Math.floor(globalStep / 2);
  const numBars = (globalStep % 2 === 0) ? pIndex : pIndex + 1;
  barState = calcLayout(numBars);
  drawTimeline(barState, DATA.slice(0,numBars), numBars);
});

// ── Init ──
addEventListener('DOMContentLoaded', () => {
  goToStep(0);
});
</script>
